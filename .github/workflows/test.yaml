name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - "1.22"
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.26"
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod tidy -diff

      - name: Run tests
        run: make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
